<style>

  h1,h2,h3,h4 { letter-spacing: -0.022em; }

  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
  .safe-top { padding-top: env(safe-area-inset-top); }

  /* Buttons */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; font-weight:600; letter-spacing:-0.01em; transition: transform .08s, background .12s; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--ink); color:#fff; }
  .btn-primary:active { background: #000; }
  .btn-accent { background: var(--orange); color:#fff; }
  .btn-accent:active { background: var(--orange-deep); }
  .btn-ghost { background: var(--surface); color: var(--ink); border:1px solid var(--line); }
  .btn-ghost:active { background: var(--line-2); }

  /* Checkbox */
  .chk { width:22px; height:22px; border:1.5px solid #D1CFCB; border-radius:6px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; background:#fff; transition: all .12s; }
  .chk.checked { background: var(--ink); border-color: var(--ink); }
  .chk.checked::after { content:''; width:6px; height:11px; border:solid #fff; border-width:0 2px 2px 0; transform: rotate(45deg) translate(-1px,-1px); }

  /* Cards */
  .card { background: var(--surface); border-radius: 14px; border: 1px solid var(--line); }
  .card-soft { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow-sm); }
  .group-card { background: var(--surface); border-radius: 14px; border: 1px solid var(--line); overflow:hidden; }
  .group-card.active { border-color: var(--ink); }
  .group-head { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; min-height:60px; }
  .room-card { background: var(--surface); border-radius: 18px; border: 1px solid var(--line); padding: 16px; box-shadow: var(--shadow-sm); }
  .room-header { display:flex; align-items:center; justify-content:space-between; gap:10px; padding-bottom: 12px; border-bottom: 1px dashed var(--line); margin-bottom: 14px; }

  /* Inputs */
  .stepper-btn { width:34px; height:34px; border-radius:9px; background:#fff; font-size:18px; font-weight:500; display:flex; align-items:center; justify-content:center; border:1px solid var(--line); color: var(--ink); }
  .stepper-btn:active { background: var(--line-2); }
  .qty-input { width: 52px; height: 34px; text-align:center; border:1px solid var(--line); border-radius:9px; font-weight:600; background:#fff; font-variant-numeric: tabular-nums; }
  .cost-input { width: 82px; height: 34px; text-align:right; border:1px solid var(--line); border-radius:9px; padding: 0 8px; font-variant-numeric: tabular-nums; background:#fff; font-weight:500; }
  .text-input { width:100%; height: 42px; padding: 0 12px; border: 1px solid var(--line); border-radius: 10px; background:#fff; font-weight:500; }
  .text-input:focus, .qty-input:focus, .cost-input:focus { outline: none; border-color: var(--ink); }

  /* Pills */
  .pill-na { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:999px; border:1px solid var(--line); color: var(--muted); font-weight:600; font-size:12.5px; background:#fff; }
  .pill-na.active { border-color: var(--orange); color: var(--orange); background: var(--orange-soft); }
  .badge-money { display:inline-flex; align-items:center; padding:4px 10px; border-radius:999px; background: var(--ink); color:#fff; font-size:11.5px; font-weight:700; letter-spacing:0.01em; font-variant-numeric: tabular-nums; }

  /* Sheets */
  .sheet { position:fixed; inset:0; background: rgba(26,26,26,0.45); backdrop-filter: blur(4px); display:none; align-items:flex-end; z-index:50; }
  .sheet.open { display:flex; }
  .sheet-panel { background:#fff; width:100%; border-radius: 22px 22px 0 0; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform .28s cubic-bezier(.16,1,.3,1); padding-bottom: env(safe-area-inset-bottom); box-shadow: var(--shadow-lg); }
  .sheet.open .sheet-panel { transform: translateY(0); }
  .sheet-handle { width:38px; height:4px; background: #E5E3DE; border-radius:999px; margin: 10px auto 4px; }
  .side { position:fixed; inset:0; background:rgba(26,26,26,0.45); backdrop-filter: blur(4px); display:none; z-index:60; }
  .side.open { display:block; }
  .side-panel { position:absolute; left:0; top:0; bottom:0; width:86%; max-width:360px; background:#fff; transform:translateX(-100%); transition: transform .26s cubic-bezier(.16,1,.3,1); display:flex; flex-direction:column; padding-top: env(safe-area-inset-top); }
  .side.open .side-panel { transform:translateX(0); }

  .swipe-anim { animation: slideUp .28s cubic-bezier(.16,1,.3,1); }

  .collapse { max-height: 0; overflow: hidden; transition: max-height .32s ease; }
  .collapse.open { max-height: 5000px; }
  .progress-track { height:4px; border-radius:999px; background: var(--line); overflow:hidden; }
  .progress-fill { height:100%; background: var(--orange); transition: width .35s ease; border-radius: 999px; }
  .roi-bar { height:6px; border-radius:999px; background:var(--line); overflow:hidden; display:flex; }
  .toast { position:fixed; bottom:130px; left:50%; transform:translateX(-50%) translateY(8px); background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:13px; font-weight:500; z-index:100; opacity:0; transition: all .22s; pointer-events:none; box-shadow: var(--shadow-lg); }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  textarea, input, select, button { font-family: inherit; }
  .scroll-hide::-webkit-scrollbar { display:none; }
  .row-checked { background: var(--orange-soft); }

  /* Mic recording pulse */
  .mic-rec { background: var(--orange); color:#fff; animation: pulse 1.4s ease-in-out infinite; }

  kbd { font-family: 'Inter', sans-serif; font-size:10px; padding:2px 6px; border-radius:5px; background:var(--line-2); border:1px solid var(--line); color: var(--muted); font-weight:600; }

  @media print { .no-print { display:none !important; } }
</style>

/* ============ STATE ============ */
let state = {
  projects: {},
  currentId: null,
  priceOverridesGlobal: {},
};

/* ============ STORAGE ============ */
const KEY = "sparkhomes-estimator-v2";
const KEY_OLD = "sparkhomes-estimator-v1";
function save(){ try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){ toast("Storage full — export & remove photos"); } }
function load(){
  try {
    let raw = localStorage.getItem(KEY);
    if(!raw){ raw = localStorage.getItem(KEY_OLD); }
    if(raw){ state = JSON.parse(raw); }
  } catch(e){ console.warn("load failed", e); }
  if(!state.projects) state.projects = {};
  if(!state.priceOverridesGlobal) state.priceOverridesGlobal = {};
  if(!state.currentId || !state.projects[state.currentId]){
    const ids = Object.keys(state.projects);
    if(ids.length){ state.currentId = ids[0]; }
    else { createProject("My First Walkthrough"); }
  }
}

/* ============ HELPERS ============ */
const uid = () => Math.random().toString(36).slice(2, 10);
const fmt = (n) => "$" + (Math.round(n)).toLocaleString();
const fmt2 = (n) => "$" + (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
function getCost(itemId, project){
  if(project && project.priceOverrides && project.priceOverrides[itemId] != null) return project.priceOverrides[itemId];
  if(state.priceOverridesGlobal[itemId] != null) return state.priceOverridesGlobal[itemId];
  return ITEMS[itemId] ? ITEMS[itemId].cost : 0;
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), 2000);
}
function escapeHtml(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ============ PROJECT OPS ============ */
function createProject(name){
  const id = uid();
  state.projects[id] = {
    id, name: name || "Untitled Project", createdAt: Date.now(),
    address: "", notes: "",
    rooms: [], photos: [], priceOverrides: {},
    deal: { purchase: 0, arv: 0, holdingPct: 2, holdingMonths: 3, commissionPct: 6 }
  };
  state.currentId = id; save(); return id;
}
function duplicateProject(id){
  const src = state.projects[id]; if(!src) return;
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = uid(); copy.name = src.name + " (copy)"; copy.createdAt = Date.now();
  state.projects[copy.id] = copy; state.currentId = copy.id; save();
}
function deleteProject(id){
  delete state.projects[id];
  if(state.currentId === id){
    const ids = Object.keys(state.projects);
    state.currentId = ids[0] || null;
    if(!state.currentId) createProject("New Walkthrough");
  }
  save();
}
function addRoom(type){
  const p = current();
  const existing = p.rooms.filter(r => r.type === type).length;
  const room = {
    id: uid(), type,
    name: `${type}${existing ? ' ' + (existing+1) : ''}`,
    notes: "",
    groups: ROOM_TYPES[type].map(g => ({
      id: uid(), name: g.name,
      items: g.items.map(itemId => ({ itemId, qty: 0, costOverride: null })),
      customItems: [],
      noAction: false
    }))
  };
  p.rooms.push(room); save();
}
function current(){ return state.projects[state.currentId]; }

/* ============ CALCULATIONS ============ */
function lineTotal(item, project){
  if(item.custom) return (item.qty||0) * (item.cost||0);
  const c = item.costOverride != null ? item.costOverride : getCost(item.itemId, project);
  return (item.qty||0) * c;
}
function groupTotal(group, project){
  let t = 0;
  for(const it of group.items) t += lineTotal(it, project);
  for(const it of (group.customItems||[])) t += lineTotal(it, project);
  return t;
}
function roomTotal(room, project){
  let t = 0; for(const g of room.groups) t += groupTotal(g, project); return t;
}
function projectTotal(project){
  let t = 0; for(const r of project.rooms) t += roomTotal(r, project); return t;
}
function groupIsActive(g){
  if(g.noAction) return true;
  for(const it of g.items) if(it.qty > 0) return true;
  for(const it of (g.customItems||[])) if(it.qty > 0) return true;
  return false;
}
function progressStats(project){
  let total = 0, done = 0;
  for(const r of project.rooms){
    for(const g of r.groups){ total++; if(groupIsActive(g)) done++; }
  }
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function renderDealAnalyzer(p){
  const d = p.deal;
  const repairs = projectTotal(p);
  const holding = (d.purchase||0) * (d.holdingPct/100) * (d.holdingMonths||0);
  const commission = (d.arv||0) * (d.commissionPct/100);
  const basis = (d.purchase||0) + repairs + holding + commission;
  const profit = (d.arv||0) - basis;
  const roi = basis > 0 ? (profit/basis)*100 : 0;
  // 70% rule MAO: ARV*0.70 - repairs
  const mao70 = Math.max(0, (d.arv||0)*0.70 - repairs);
  let verdict, vColor, vBg, vBorder;
  if(roi >= 20){ verdict="Strong Deal"; vColor="#0F4D2A"; vBg="#E7F4EC"; vBorder="#B8DCC6"; }
  else if(roi >= 10){ verdict="Marginal"; vColor="#7A4A0E"; vBg="#FBF1E8"; vBorder="#F5E1CC"; }
  else { verdict="Pass"; vColor="#7E1F1F"; vBg="#FBEAEA"; vBorder="#F1C9C9"; }
  const total = basis;
  const pct = (n) => total>0 ? (n/total*100) : 0;

  return `
    <section class="room-card mb-3 swipe-anim">
      <div class="room-header">
        <div class="flex items-center gap-2.5 min-w-0 flex-1">

            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div class="min-w-0">
            <div class="text-[15px] font-bold">Deal Analyzer</div>
            <div class="text-[11px] text-[var(--muted)] font-medium">ROI · MAO · Gross profit</div>
          </div>
        </div>
        <span class="text-[10.5px] font-bold px-2.5 py-1 rounded-full" style="background:${vBg};color:${vColor};border:1px solid ${vBorder};">${verdict}</span>
      </div>
      <div class="grid grid-cols-2 gap-2 mb-3">
        ${dealInput("Purchase Price","purchase",d.purchase,"$")}
        ${dealInput("ARV","arv",d.arv,"$")}
        ${dealInput("Holding %/mo","holdingPct",d.holdingPct,"%")}
        ${dealInput("Holding Months","holdingMonths",d.holdingMonths,"#")}
        <div class="col-span-2">${dealInput("Commission %","commissionPct",d.commissionPct,"%")}</div>
      </div>
      <div class="space-y-1.5 text-[13px] py-2.5 border-y border-[var(--line-2)] mb-3">
        <div class="flex justify-between text-[var(--muted)]"><span>Purchase</span><b class="text-[var(--ink)] tnum">${fmt(d.purchase||0)}</b></div>
        <div class="flex justify-between text-[var(--muted)]"><span>Repairs</span><b class="text-[var(--ink)] tnum">${fmt(repairs)}</b></div>
        <div class="flex justify-between text-[var(--muted)]"><span>Holding (${d.holdingMonths||0}mo @ ${d.holdingPct||0}%)</span><b class="text-[var(--ink)] tnum">${fmt(holding)}</b></div>
        <div class="flex justify-between text-[var(--muted)]"><span>Commission</span><b class="text-[var(--ink)] tnum">${fmt(commission)}</b></div>
        <div class="flex justify-between pt-2 border-t border-[var(--line-2)] mt-2"><span class="font-semibold">Total Basis</span><b class="tnum">${fmt(basis)}</b></div>
      </div>
      <div class="roi-bar mb-1.5">
        <div style="background:#A0A0A0;width:${pct(d.purchase||0)}%"></div>
        <div style="background:#C2500A;width:${pct(repairs)}%"></div>
        <div style="background:#E0B97A;width:${pct(holding)}%"></div>
        <div style="background:#7A8FA6;width:${pct(commission)}%"></div>
      </div>
      <div class="flex justify-between gap-2 text-[10px] font-medium text-[var(--muted)] mb-3">
        <span>● Purchase</span><span style="color:#C2500A">● Repairs</span><span style="color:#B98A3D">● Hold</span><span style="color:#5C7491">● Comm</span>
      </div>
      <div class="grid grid-cols-2 gap-2 mb-2">
        <div class="text-center p-3 rounded-xl" style="background:${vBg};border:1px solid ${vBorder};">
          <div class="text-[10px] uppercase font-bold tracking-wider" style="color:${vColor};">Gross Profit</div>
          <div class="text-[20px] font-extrabold tnum mt-0.5" style="color:${vColor};">${fmt(profit)}</div>
        </div>
        <div class="text-center p-3 rounded-xl" style="background:${vBg};border:1px solid ${vBorder};">
          <div class="text-[10px] uppercase font-bold tracking-wider" style="color:${vColor};">ROI</div>
          <div class="text-[20px] font-extrabold tnum mt-0.5" style="color:${vColor};">${roi.toFixed(1)}%</div>

function toggleGroup(key){
  const open = sessionStorage.getItem(key) === "1";
  sessionStorage.setItem(key, open ? "0" : "1");

}
function toggleNoAction(rid, gid){
  const g = findGroup(rid,gid); if(!g) return;
  g.noAction = !g.noAction;
  if(g.noAction){
    g.items.forEach(i=>i.qty=0);
    (g.customItems||[]).forEach(i=>i.qty=0);
  }
  save(); render();
}
function toggleItem(rid, gid, isCustom, ref){
  const g = findGroup(rid,gid); if(!g) return;
  const it = isCustom ? g.customItems[ref] : g.items.find(i=>i.itemId===ref);
  if(!it) return;
  if(it.qty > 0) it.qty = 0;
  else { it.qty = 1; g.noAction = false; }
  save(); render();
}
function stepQty(rid, gid, isCustom, ref, delta){
  const g = findGroup(rid,gid); if(!g) return;
  const it = isCustom ? g.customItems[ref] : g.items.find(i=>i.itemId===ref);
  if(!it) return;
  it.qty = Math.max(0, (parseFloat(it.qty)||0) + delta);
  if(it.qty>0) g.noAction = false;
  save(); render();
}
function setQty(rid, gid, isCustom, ref, val){
  const g = findGroup(rid,gid); if(!g) return;
  const it = isCustom ? g.customItems[ref] : g.items.find(i=>i.itemId===ref);
  if(!it) return;
  it.qty = Math.max(0, parseFloat(val)||0);
  if(it.qty>0) g.noAction = false;
  save();
  document.getElementById('grandTotal').textContent = fmt(projectTotal(current()));
}
function setCost(rid, gid, isCustom, ref, val){
  const g = findGroup(rid,gid); if(!g) return;
  const v = Math.max(0, parseFloat(val)||0);
  if(isCustom){ g.customItems[ref].cost = v; }
  else {
    const it = g.items.find(i=>i.itemId===ref);
    if(!it) return;
    it.costOverride = v;
    current().priceOverrides[ref] = v;
  }
  save();
  document.getElementById('grandTotal').textContent = fmt(projectTotal(current()));
}
function deleteCustom(rid, gid, idx){
  const g = findGroup(rid,gid); if(!g) return;
  g.customItems.splice(idx,1); save(); render();
}
function findGroup(rid, gid){
  const p = current();
  for(const r of p.rooms) if(r.id===rid) for(const g of r.groups) if(g.id===gid) return g;
  return null;
}

/* ===== Price CSV ===== */
function importPriceCsv(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    const lines = r.result.split(/\r?\n/);
    let n = 0;
    for(const line of lines){
      const parts = line.split(",").map(s=>s.trim().replace(/^"|"$/g,''));
      if(parts.length<2) continue;
      const id = parts[0]; const cost = parseFloat(parts[1]);
      if(ITEMS[id] && !isNaN(cost)){ state.priceOverridesGlobal[id] = cost; n++; }
    }
    save(); toast(`Updated ${n} prices`); closeSheet(); render();
  };
  r.readAsText(f);
}
function exportPriceCsv(){
  let csv = "id,name,cost,unit\n";
  for(const id of Object.keys(ITEMS)){
    const c = state.priceOverridesGlobal[id] != null ? state.priceOverridesGlobal[id] : ITEMS[id].cost;
    csv += `${id},"${ITEMS[id].name}",${c},${ITEMS[id].unit}\n`;
  }
  downloadBlob(new Blob([csv],{type:"text/csv"}), "spark-prices.csv");
}
function resetPrices(){
  if(!confirm("Reset all global price overrides?")) return;
  state.priceOverridesGlobal = {}; save(); toast("Prices reset"); render();
}

  const p = current();
  const ph = { id: uid(), dataUrl, ocr: "", ocrStatus: "pending" };
  if(!p.photos) p.photos = [];
  p.photos.push(ph); save(); render();
  try {
    if(window.Tesseract){
      const res = await Tesseract.recognize(dataUrl, 'eng');
      const text = (res.data.text || "").trim();
      const serial = extractSerial(text);
      ph.ocr = serial || text.split(/\s+/).slice(0,6).join(' ');
      ph.ocrStatus = "done"; save(); render();
    } else { ph.ocrStatus="done"; save(); render(); }
  } catch(err){ console.warn(err); ph.ocrStatus="done"; save(); render(); }
  e.target.value = "";
}
function extractSerial(text){
  const lines = text.split(/\r?\n/);
  for(const line of lines){
    const m = line.match(/\b([A-Z0-9]{2,}[-]?[A-Z0-9]{4,})\b/i);
    if(m && /\d/.test(m[1]) && /[A-Za-z]/.test(m[1])) return m[1];
  }
  const m2 = text.match(/\b([A-Z0-9]{6,20})\b/);
  return m2 ? m2[1] : "";
}
function fileToCompressedDataUrl(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject; img.src = r.result;
    };
    r.onerror = reject; r.readAsDataURL(file);
  });
}
function deletePhoto(id){
  const p = current(); p.photos = (p.photos||[]).filter(x=>x.id!==id); save(); render();
}

/* ===== VOICE NOTES (Web Speech API) ===== */
let _rec = null, _recRoom = null;
function toggleVoiceNote(rid){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ toast("Voice not supported in this browser"); return; }
  if(_rec && _recRoom === rid){ _rec.stop(); return; }
  if(_rec){ _rec.stop(); }
  const r = new SR();
  r.lang = 'en-US'; r.interimResults = true; r.continuous = true;
  const ta = document.getElementById('note-'+rid);
  const btn = document.getElementById('mic-'+rid);
  if(!ta || !btn) return;
  const baseText = ta.value ? ta.value.trim() + (ta.value.trim()?' ':'') : '';
  let finalText = '';
  r.onresult = (e) => {
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalText += t + ' ';
      else interim += t;
    }
    ta.value = baseText + finalText + interim;
    setRoomNote(rid, ta.value);
  };
  r.onend = () => {
    _rec = null; _recRoom = null;
    btn.classList.remove('mic-rec');
    btn.style.color = ''; btn.style.background = '';
  };
  r.onerror = (ev) => { toast("Voice: " + (ev.error||"error")); };
  try { r.start(); _rec = r; _recRoom = rid; btn.classList.add('mic-rec'); toast("Listening…"); }
  catch(err){ toast("Could not start microphone"); }
}

function importFromHash(){
  if(!location.hash.startsWith('#share=')) return;
  try {
    const payload = location.hash.slice(7);
    const json = LZString.decompressFromEncodedURIComponent(payload);
    if(!json) return;
    const imported = JSON.parse(json);
    if(!imported || !imported.rooms) return;
    if(!confirm(`Import shared project "${imported.name}"?`)) {
      history.replaceState(null, '', location.pathname); return;
    }
    imported.id = uid();
    imported.name = imported.name + ' (shared)';
    imported.createdAt = Date.now();
    state.projects[imported.id] = imported;
    state.currentId = imported.id; save();
    history.replaceState(null, '', location.pathname);
    toast("Project imported");
  } catch(e){ console.warn('import failed', e); }
}

async function doExportZip(){
  const p = current(); if(!p) return;
  toast("Building export…");
  const rows = [["Room","Group","Item","Qty","Unit","Unit Cost","Line Total"]];
  let grand = 0;
  for(const r of p.rooms){
    for(const g of r.groups){
      const all = [...g.items, ...(g.customItems||[])];
      for(const it of all){
        if(!it.qty || it.qty<=0) continue;
        const name = it.custom ? it.name : ITEMS[it.itemId].name;
        const unit = it.custom ? it.unit : ITEMS[it.itemId].unit;
        const cost = it.custom ? it.cost : (it.costOverride != null ? it.costOverride : getCost(it.itemId, p));
        const total = (it.qty||0)*cost; grand += total;
        rows.push([r.name, g.name, name, it.qty, unit, cost, total]);
      }
    }
  }
  rows.push(["","","","","","Grand Total", grand]);

  const ws = XLSX.utils.aoa_to_sheet(rows);
  const headerStyle = { fill:{fgColor:{rgb:"C2500A"}}, font:{color:{rgb:"FFFFFF"}, bold:true}, alignment:{horizontal:"center"} };
  const totalStyle = { font:{bold:true}, fill:{fgColor:{rgb:"FBF1E8"}} };
  for(let c=0;c<7;c++){ const cell = XLSX.utils.encode_cell({r:0,c}); if(ws[cell]) ws[cell].s = headerStyle; }
  const lastRow = rows.length-1;
  for(let c=0;c<7;c++){ const cell = XLSX.utils.encode_cell({r:lastRow,c}); if(ws[cell]) ws[cell].s = totalStyle; }
  for(let r=1;r<rows.length;r++){ for(const c of [5,6]){ const cell = XLSX.utils.encode_cell({r,c}); if(ws[cell]){ ws[cell].t = "n"; ws[cell].z = '"$"#,##0.00'; } } }
  ws['!cols'] = [{wch:18},{wch:24},{wch:38},{wch:8},{wch:12},{wch:12},{wch:14}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Estimate");

  const d = p.deal; const repairs = projectTotal(p);
  const holding = (d.purchase||0)*(d.holdingPct/100)*(d.holdingMonths||0);
  const commission = (d.arv||0)*(d.commissionPct/100);
  const basis = (d.purchase||0)+repairs+holding+commission;
  const profit = (d.arv||0)-basis;
  const roi = basis>0 ? profit/basis*100 : 0;
  const dealRows = [
    ["Spark Homes Deal Analysis"],
    ["Project", p.name],
    ["Address", p.address||""],
    [],
    ["Purchase Price", d.purchase||0],
    ["ARV", d.arv||0],
    ["Repair Estimate", repairs],
    ["Holding Costs", holding],
    ["Commission", commission],
    ["Total Cost Basis", basis],
    ["Gross Profit", profit],
    ["ROI %", roi/100],
    ["MAO (70% rule)", Math.max(0,(d.arv||0)*0.70 - repairs)],
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(dealRows);
  if(ws2['A1']) ws2['A1'].s = { font:{bold:true,sz:14,color:{rgb:"C2500A"}} };
  for(let r=4;r<=10;r++){ const c = XLSX.utils.encode_cell({r,c:1}); if(ws2[c]){ ws2[c].t="n"; ws2[c].z='"$"#,##0.00'; } }
  const roiCell = XLSX.utils.encode_cell({r:11,c:1}); if(ws2[roiCell]){ ws2[roiCell].t="n"; ws2[roiCell].z='0.0%'; }
  const maoCell = XLSX.utils.encode_cell({r:12,c:1}); if(ws2[maoCell]){ ws2[maoCell].t="n"; ws2[maoCell].z='"$"#,##0.00'; }
  ws2['!cols'] = [{wch:24},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws2, "Deal Analysis");

  const xlsxOut = XLSX.write(wb, { bookType:"xlsx", type:"array", cellStyles:true });
  const zip = new JSZip();
  const safe = (p.name||'project').replace(/[^a-z0-9-_ ]/gi,'_').trim() || "project";
  zip.file(`${safe} - Estimate.xlsx`, xlsxOut);
  (p.photos||[]).forEach((ph, i) => {
    const b64 = ph.dataUrl.split(',')[1];
    zip.file(`photos/photo-${i+1}.jpg`, b64, { base64:true });
  });
  // include notes
  let notes = `${p.name}\n${p.address||''}\n\n`;
  for(const r of p.rooms){ if(r.notes){ notes += `## ${r.name}\n${r.notes}\n\n`; } }
  zip.file(`${safe} - Notes.txt`, notes);
  const blob = await zip.generateAsync({ type:"blob" });
  downloadBlob(blob, `${safe}.zip`);
  toast("ZIP downloaded");
}

/* ===== PDF (Client-ready, branded one-pager) ===== */
async function doExportPdf(){
  const p = current(); if(!p) return;
  toast("Generating PDF…");
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'letter' });
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const M = 40; // margin
  const ORANGE = [194,80,10];
  const INK = [26,26,26];
  const MUTED = [107,107,107];
  const SOFT = [251,241,232];
  const LINE = [236,234,230];

  // === Header band ===
  doc.setFillColor(...INK); doc.rect(0,0,W,76,'F');
  doc.setFillColor(...ORANGE); doc.roundedRect(M,22,32,32,6,6,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...ORANGE);
  doc.text('SPARK HOMES', M+44, 36);
  doc.setFontSize(18); doc.setTextColor(255,255,255);
  doc.text('Repair Estimate', M+44, 56);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(200,200,200);
  doc.text(new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'}), W-M, 56, {align:'right'});

  let y = 100;
  // === Property block ===
  doc.setTextColor(...INK); doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text(p.name || 'Untitled Project', M, y); y += 16;
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(...MUTED);
  if(p.address) { doc.text(p.address, M, y); y += 14; }
  y += 10;

  // === Totals strip ===
  const d = p.deal;
  const repairs = projectTotal(p);
  const holding = (d.purchase||0)*(d.holdingPct/100)*(d.holdingMonths||0);
  const commission = (d.arv||0)*(d.commissionPct/100);
  const basis = (d.purchase||0)+repairs+holding+commission;
  const profit = (d.arv||0)-basis;
  const roi = basis>0 ? (profit/basis)*100 : 0;
  const mao = Math.max(0, (d.arv||0)*0.70 - repairs);

  const stripH = 80;
  doc.setFillColor(...SOFT); doc.roundedRect(M, y, W-2*M, stripH, 10, 10, 'F');
  const colW = (W-2*M)/4;
  const metrics = [
    ['Repair Estimate', '$'+Math.round(repairs).toLocaleString()],
    ['Purchase', '$'+Math.round(d.purchase||0).toLocaleString()],
    ['ARV', '$'+Math.round(d.arv||0).toLocaleString()],
    ['Gross Profit', '$'+Math.round(profit).toLocaleString()],
  ];
  metrics.forEach((m, i) => {
    const x = M + i*colW + colW/2;
    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...MUTED);
    doc.text(m[0].toUpperCase(), x, y+22, {align:'center'});
    doc.setFontSize(18); doc.setTextColor(i===3 ? (profit>=0?ORANGE:[200,50,50]) : INK);
    doc.setTextColor(...(i===3 ? (profit>=0?ORANGE:[200,50,50]) : INK));
    doc.text(m[1], x, y+50, {align:'center'});
    if(i < 3){ doc.setDrawColor(...LINE); doc.line(x+colW/2, y+18, x+colW/2, y+stripH-18); }
  });
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...MUTED);
  doc.text(`ROI ${roi.toFixed(1)}% · MAO (70% rule) $${Math.round(mao).toLocaleString()} · Holding $${Math.round(holding).toLocaleString()} · Commission $${Math.round(commission).toLocaleString()}`, W/2, y+stripH-6, {align:'center'});
  y += stripH + 22;

  // === Room breakdown table ===
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(...INK);
  doc.text('Scope of Work', M, y); y += 14;
  doc.setDrawColor(...LINE); doc.setLineWidth(0.5); doc.line(M, y-6, W-M, y-6);

  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...MUTED);
  doc.text('ROOM / ITEM', M, y);
  doc.text('QTY', W-180, y, {align:'right'});
  doc.text('UNIT $', W-100, y, {align:'right'});
  doc.text('TOTAL', W-M, y, {align:'right'});
  y += 10;
  doc.setLineWidth(0.5); doc.line(M, y, W-M, y); y += 8;

  const ensureSpace = (need) => {
    if(y + need > H - 60){
      doc.addPage();
      y = 50;
    }
  };

  for(const room of p.rooms){
    ensureSpace(40);
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...ORANGE);
    doc.text(room.name, M, y);
    doc.setTextColor(...INK); doc.setFontSize(10);
    doc.text('$'+Math.round(roomTotal(room,p)).toLocaleString(), W-M, y, {align:'right'});
    y += 12;
    let hasItems = false;
    for(const g of room.groups){
      const all = [...g.items, ...(g.customItems||[])].filter(i => i.qty>0);
      if(!all.length && !g.noAction) continue;
      hasItems = true;
      ensureSpace(20);
      if(g.noAction){
        doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(...MUTED);
        doc.text(`  ${g.name} — no action needed`, M, y); y += 12;
        continue;
      }
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...MUTED);
      doc.text('  ' + g.name, M, y); y += 11;
      for(const it of all){
        ensureSpace(14);
        const nm = it.custom ? it.name : ITEMS[it.itemId].name;
        const unit = it.custom ? it.unit : ITEMS[it.itemId].unit;
        const cost = it.custom ? it.cost : (it.costOverride!=null?it.costOverride:getCost(it.itemId,p));
        const tot = (it.qty||0)*cost;
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...INK);
        const nmW = W - M - 200;
        const nameWrap = doc.splitTextToSize(nm, nmW);
        doc.text(nameWrap[0], M+12, y);
        doc.text(`${it.qty} ${unit}`, W-180, y, {align:'right'});
        doc.text('$'+Number(cost).toFixed(2), W-100, y, {align:'right'});
        doc.text('$'+Math.round(tot).toLocaleString(), W-M, y, {align:'right'});
        y += 12;
      }
    }
    if(!hasItems){
      doc.setFont('helvetica','italic'); doc.setFontSize(9); doc.setTextColor(...MUTED);
      doc.text('  (no items selected)', M, y); y += 12;
    }
    if(room.notes){
      ensureSpace(20);
      doc.setFont('helvetica','italic'); doc.setFontSize(8); doc.setTextColor(...MUTED);
      const noteW = doc.splitTextToSize('Notes: ' + room.notes, W-2*M-12);
      noteW.forEach(line => { ensureSpace(11); doc.text(line, M+12, y); y += 10; });
    }
    y += 6;
  }

  // Grand total
  ensureSpace(40);
  doc.setDrawColor(...INK); doc.setLineWidth(1); doc.line(M, y, W-M, y); y += 18;
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(...INK);
  doc.text('TOTAL REPAIR ESTIMATE', M, y);
  doc.setFontSize(16); doc.setTextColor(...ORANGE);
  doc.text('$'+Math.round(repairs).toLocaleString(), W-M, y, {align:'right'});
  y += 20;

  // === Photos page ===
  const photos = (p.photos||[]).slice(0, 9);
  if(photos.length){
    doc.addPage(); y = 50;
    doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(...INK);
    doc.text('Walkthrough Photos', M, y); y += 18;
    const cols = 3; const gap = 10;
    const cell = (W - 2*M - gap*(cols-1)) / cols;
    let xi = 0, yi = y;
    for(const ph of photos){
      try {
        doc.addImage(ph.dataUrl, 'JPEG', M + xi*(cell+gap), yi, cell, cell, undefined, 'FAST');
        if(ph.ocr){
          doc.setFillColor(...ORANGE); doc.rect(M + xi*(cell+gap), yi+cell-14, cell, 14, 'F');
          doc.setFontSize(7); doc.setTextColor(255,255,255); doc.setFont('helvetica','bold');
          doc.text('SN: ' + ph.ocr.slice(0,28), M + xi*(cell+gap) + 4, yi+cell-4);
        }
      } catch(e){ console.warn('img add failed', e); }
      xi++;
      if(xi >= cols){ xi = 0; yi += cell + gap; if(yi + cell > H - 60){ doc.addPage(); yi = 50; } }
    }
  }

  // Footer on every page
  const pages = doc.internal.getNumberOfPages();
  for(let i=1; i<=pages; i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...MUTED);
    doc.text('Spark Homes Estimator · Confidential', M, H-24);
    doc.text(`Page ${i} of ${pages}`, W-M, H-24, {align:'right'});
  }

  const safe = (p.name||'estimate').replace(/[^a-z0-9-_ ]/gi,'_').trim();
  doc.save(`${safe} - Spark Estimate.pdf`);
  toast("PDF downloaded");
}

function downloadBlob(blob, name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 200);
}

/* ============ PWA: service worker (preview-safe) ============ */
(function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  if(location.protocol === 'file:') return;
  const host = location.hostname;
  const isPreview = host.startsWith('id-preview--') || host.startsWith('preview--') ||
    host.endsWith('.lovableproject.com') || host.endsWith('.lovableproject-dev.com') ||
    host.endsWith('.beta.lovable.dev') || host === 'localhost' || host === '127.0.0.1';
  if(isPreview){
    // Cleanup any prior registrations from preview hosts so this app doesn't cache here.
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())).catch(()=>{});
    return;
  }
  const swCode = `
    const CACHE = 'spark-estimator-v2';
    const ASSETS = [
      'https://cdn.tailwindcss.com',
      'https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js',
      'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js',
      'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js',
      'https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js',
      'https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js'
    ];
    self.addEventListener('install', e => { self.skipWaiting(); e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS).catch(()=>{}))); });
    self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
    self.addEventListener('fetch', e => {
      const req = e.request;
      if(req.method !== 'GET') return;
      const isNav = req.mode === 'navigate';
      if(isNav){
        e.respondWith(fetch(req).catch(() => caches.match(req).then(r => r || caches.match('/'))));
        return;
      }
      e.respondWith(
        caches.match(req).then(hit => hit || fetch(req).then(res => {
          const copy = res.clone();
          if(res.ok) caches.open(CACHE).then(c => c.put(req, copy)).catch(()=>{});
          return res;
        }).catch(() => undefined))
      );
    });
  `;
  const blob = new Blob([swCode], { type:'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(err => console.warn('SW failed', err));
})();
