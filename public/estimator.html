<style>
  :root {
    --orange: #C2500A;
    --orange-light: #FDF2E9;
    --orange-tint: #FAE5D3;
    --dark: #111827;
    --bg: #F1F5F9;
    --border: #E2E8F0;
    --muted: #64748B;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--dark); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overscroll-behavior: none; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); }
  .safe-top { padding-top: env(safe-area-inset-top); }
  .btn-primary { background: var(--orange); color: white; }
  .btn-primary:active { background: #9F4108; }
  .chk { width:26px; height:26px; border:2px solid #CBD5E1; border-radius:7px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; background:white; transition: all .15s; }
  .chk.checked { background: var(--orange); border-color: var(--orange); }
  .chk.checked::after { content:'✓'; color:white; font-weight:800; font-size:16px; line-height:1; }
  .row-checked { background: var(--orange-light); }
  .group-card { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.04); border: 1px solid var(--border); }
  .group-head { display:flex; align-items:center; gap:10px; padding:14px 16px; cursor:pointer; min-height:56px; }
  .group-head.done { background: linear-gradient(90deg, var(--orange-light), white); }
  .room-head { background: var(--dark); color: white; padding: 12px 16px; border-radius: 12px; display:flex; align-items:center; justify-content:space-between; min-height: 52px; }
  .room-head .badge { background: var(--orange); color: white; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
  .stepper-btn { width:38px; height:38px; border-radius:10px; background:#F1F5F9; font-size:20px; font-weight:600; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); }
  .stepper-btn:active { background:#E2E8F0; }
  .qty-input { width: 56px; height: 38px; text-align:center; border:1px solid var(--border); border-radius:10px; font-weight:600; }
  .cost-input { width: 88px; height: 38px; text-align:right; border:1px solid var(--border); border-radius:10px; padding: 0 8px; font-variant-numeric: tabular-nums; }
  .pill-na { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:999px; border:2px solid #CBD5E1; color: var(--muted); font-weight:600; font-size:13px; background:white; }
  .pill-na.active { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
  .sheet { position:fixed; inset:0; background: rgba(15,23,42,0.55); display:none; align-items:flex-end; z-index:50; }
  .sheet.open { display:flex; }
  .sheet-panel { background:white; width:100%; border-radius: 20px 20px 0 0; max-height: 88vh; overflow-y: auto; transform: translateY(100%); transition: transform .25s ease; padding-bottom: env(safe-area-inset-bottom); }
  .sheet.open .sheet-panel { transform: translateY(0); }
  .side { position:fixed; inset:0; background:rgba(15,23,42,0.55); display:none; z-index:60; }
  .side.open { display:block; }
  .side-panel { position:absolute; left:0; top:0; bottom:0; width:84%; max-width:340px; background:white; transform:translateX(-100%); transition: transform .22s ease; display:flex; flex-direction:column; padding-top: env(safe-area-inset-top); }
  .side.open .side-panel { transform:translateX(0); }
  .swipe-anim { animation: slideUp .3s ease; }
  @keyframes slideUp { from { transform: translateY(8px); opacity:0;} to {transform:translateY(0); opacity:1;} }
  .collapse { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .collapse.open { max-height: 4000px; }
  .roi-bar { height:14px; border-radius:999px; background:#E2E8F0; overflow:hidden; display:flex; }
  .progress-track { height:8px; border-radius:999px; background:#E2E8F0; overflow:hidden; }
  .progress-fill { height:100%; background: var(--orange); transition: width .3s; }
  .toast { position:fixed; bottom:120px; left:50%; transform:translateX(-50%); background:var(--dark); color:white; padding:10px 18px; border-radius:999px; font-size:13px; z-index:100; opacity:0; transition: opacity .2s; pointer-events:none; }
  .toast.show { opacity:1; }
  textarea, input, select, button { font-family: inherit; }
  .scroll-hide::-webkit-scrollbar { display:none; }
</style>

/* ============ STATE ============ */
let state = {
  projects: {},        // {id: project}
  currentId: null,
  priceOverridesGlobal: {}, // global override of ITEMS cost
};

// project shape:
// { id, name, createdAt, rooms: [{id, type, name, groups:[{id, name, items:[{itemId, qty, costOverride, custom?, name?, unit?}], noAction:false, customNotes}]}], photos:[{id, dataUrl, ocr}], priceOverrides:{itemId:cost}, deal:{purchase,arv,holdingPct,holdingMonths,commissionPct} }

/* ============ STORAGE ============ */
const KEY = "sparkhomes-estimator-v1";
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function load(){
  try {
    const raw = localStorage.getItem(KEY);
    if(raw){ state = JSON.parse(raw); }
  } catch(e){ console.warn("load failed", e); }
  if(!state.projects) state.projects = {};
  if(!state.priceOverridesGlobal) state.priceOverridesGlobal = {};
  if(!state.currentId || !state.projects[state.currentId]){
    const ids = Object.keys(state.projects);
    if(ids.length){ state.currentId = ids[0]; }
    else { createProject("My First Walkthrough"); }
  }
}

/* ============ HELPERS ============ */
const uid = () => Math.random().toString(36).slice(2, 10);
const fmt = (n) => "$" + (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:0, maximumFractionDigits:0});
const fmt2 = (n) => "$" + (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
function getCost(itemId, project){
  if(project && project.priceOverrides && project.priceOverrides[itemId] != null) return project.priceOverrides[itemId];
  if(state.priceOverridesGlobal[itemId] != null) return state.priceOverridesGlobal[itemId];
  return ITEMS[itemId] ? ITEMS[itemId].cost : 0;
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ============ PROJECT OPS ============ */
function createProject(name){
  const id = uid();
  state.projects[id] = {
    id, name: name || "Untitled Project", createdAt: Date.now(),
    rooms: [], photos: [], priceOverrides: {},
    deal: { purchase: 0, arv: 0, holdingPct: 2, holdingMonths: 3, commissionPct: 6 }
  };
  state.currentId = id; save(); return id;
}
function deleteProject(id){
  delete state.projects[id];
  if(state.currentId === id){
    const ids = Object.keys(state.projects);
    state.currentId = ids[0] || null;
    if(!state.currentId) createProject("New Walkthrough");
  }
  save();
}
function addRoom(type){
  const p = current();
  const existing = p.rooms.filter(r => r.type === type).length;
  const room = {
    id: uid(), type,
    name: `${type} ${existing+1}`,
    groups: ROOM_TYPES[type].map(g => ({
      id: uid(), name: g.name,
      items: g.items.map(itemId => ({ itemId, qty: 0, costOverride: null })),
      customItems: [],
      noAction: false
    }))
  };
  p.rooms.push(room); save();
}
function current(){ return state.projects[state.currentId]; }

/* ============ CALCULATIONS ============ */
function lineTotal(item, project){
  if(item.custom) return (item.qty||0) * (item.cost||0);
  const c = item.costOverride != null ? item.costOverride : getCost(item.itemId, project);
  return (item.qty||0) * c;
}
function groupTotal(group, project){
  let t = 0;
  for(const it of group.items) t += lineTotal(it, project);
  for(const it of (group.customItems||[])) t += lineTotal(it, project);
  return t;
}
function roomTotal(room, project){
  let t = 0; for(const g of room.groups) t += groupTotal(g, project); return t;
}
function projectTotal(project){
  let t = 0; for(const r of project.rooms) t += roomTotal(r, project); return t;
}
function groupIsActive(g){
  if(g.noAction) return true;
  for(const it of g.items) if(it.qty > 0) return true;
  for(const it of (g.customItems||[])) if(it.qty > 0) return true;
  return false;
}
function progressStats(project){
  let total = 0, done = 0;
  for(const r of project.rooms){
    for(const g of r.groups){
      total++;
      if(groupIsActive(g)) done++;
    }
  }
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

/* ============ RENDER ============ */
function render(){
  const p = current();
  document.getElementById('projTitle').textContent = p ? p.name : "—";
  if(!p){ document.getElementById('main').innerHTML = ""; return; }

  const stats = progressStats(p);
  document.getElementById('progressLabel').textContent = `${stats.done} / ${stats.total} groups reviewed`;
  document.getElementById('progressPct').textContent = stats.pct + "%";
  document.getElementById('progressFill').style.width = stats.pct + "%";
  document.getElementById('grandTotal').textContent = fmt(projectTotal(p));

  const main = document.getElementById('main');
  let html = "";

  // Empty state
  if(p.rooms.length === 0){
    html += `
      <div class="bg-white rounded-2xl border border-slate-200 p-8 text-center mt-6">
        <div class="text-5xl mb-2">🏠</div>
        <h3 class="font-bold text-lg mb-1">Start your walkthrough</h3>
        <p class="text-sm text-slate-500 mb-5">Add the first room you're standing in to begin estimating repairs.</p>
        <button onclick="openAddRoomSheet()" class="h-12 px-6 rounded-full btn-primary font-semibold">+ Add First Room</button>
      </div>`;
  }

  // Rooms
  p.rooms.forEach((room, ri) => {
    const rTotal = roomTotal(room, p);
    html += `
      <section class="mb-3 swipe-anim">
        <div class="room-head mb-2">
          <div class="flex items-center gap-2 min-w-0 flex-1">
            <input value="${escapeAttr(room.name)}" oninput="renameRoom('${room.id}', this.value)" class="bg-transparent text-white font-bold text-base outline-none w-full truncate" />
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <span class="badge">${fmt(rTotal)}</span>
            <button onclick="confirmDeleteRoom('${room.id}')" class="w-8 h-8 rounded-lg flex items-center justify-center active:bg-white/10" aria-label="Delete room">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
            </button>
          </div>
        </div>`;

    room.groups.forEach((group, gi) => {
      const gTotal = groupTotal(group, p);
      const allItems = [...group.items, ...(group.customItems||[])];
      const checkedCount = allItems.filter(i => i.qty>0).length;
      const isDone = groupIsActive(group);
      const openKey = `open_${room.id}_${group.id}`;
      const isOpen = sessionStorage.getItem(openKey) === "1";

      html += `
        <div class="group-card mb-2">
          <div class="group-head ${isDone ? 'done' : ''}" onclick="toggleGroup('${openKey}', this)">
            <div class="w-7 h-7 rounded-full flex items-center justify-center ${isDone ? 'bg-[#C2500A] text-white' : 'bg-slate-100 text-slate-400'}">
              ${isDone ? '✓' : '·'}
            </div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-sm text-slate-900 truncate">${escapeHtml(group.name)}</div>
              <div class="text-[11px] text-slate-500">${checkedCount} item${checkedCount===1?'':'s'} · ${fmt(gTotal)}</div>
            </div>
            <svg class="text-slate-400 transition-transform ${isOpen ? 'rotate-180' : ''}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="collapse ${isOpen?'open':''}" id="c_${room.id}_${group.id}">
            <div class="border-t border-slate-100 px-3 py-3 space-y-2">
              <div class="flex">
                <button onclick="toggleNoAction('${room.id}','${group.id}')" class="pill-na ${group.noAction ? 'active' : ''}">
                  ${group.noAction ? '✓' : ''} No Action Needed
                </button>
              </div>
              ${allItems.map((it, idx) => renderItemRow(room.id, group.id, it, idx >= group.items.length, idx - group.items.length, p)).join('')}
              <button onclick="openAddItemSheet('${room.id}','${group.id}')" class="w-full mt-1 h-10 rounded-lg border-2 border-dashed border-slate-300 text-sm font-medium text-slate-500 active:bg-slate-50">+ Add Custom Item</button>
            </div>
          </div>
        </div>`;
    });

    html += `</section>`;
  });

  // Photos
  if(p.rooms.length){
    html += renderPhotos(p);
    html += renderDealAnalyzer(p);
  }

  main.innerHTML = html;
}

function renderItemRow(roomId, groupId, item, isCustom, customIdx, project){
  const cost = item.custom ? item.cost : (item.costOverride != null ? item.costOverride : getCost(item.itemId, project));
  const name = item.custom ? item.name : ITEMS[item.itemId].name;
  const unit = item.custom ? item.unit : ITEMS[item.itemId].unit;
  const checked = (item.qty||0) > 0;
  const total = lineTotal(item, project);
  const refIdx = isCustom ? `'${customIdx}'` : item.itemId ? `'${item.itemId}'` : 'null';
  return `
    <div class="rounded-lg ${checked ? 'row-checked' : ''} p-2.5">
      <div class="flex items-start gap-2.5 mb-2">
        <div class="chk ${checked?'checked':''} mt-0.5" onclick="toggleItem('${roomId}','${groupId}',${isCustom},${refIdx})"></div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-slate-900 leading-snug">${escapeHtml(name)}</div>

        </div>
        <div class="text-sm font-bold tabular-nums text-slate-900 min-w-[60px] text-right">${fmt(total)}</div>

      <div class="flex items-center gap-1.5 pl-9">
        <button class="stepper-btn" onclick="stepQty('${roomId}','${groupId}',${isCustom},${refIdx},-1)">−</button>
        <input class="qty-input" type="number" min="0" step="0.5" value="${item.qty||0}" oninput="setQty('${roomId}','${groupId}',${isCustom},${refIdx}, this.value)" />
        <button class="stepper-btn" onclick="stepQty('${roomId}','${groupId}',${isCustom},${refIdx},1)">+</button>
        <div class="flex-1"></div>
        <span class="text-[11px] text-slate-400">$</span>
        <input class="cost-input" type="number" min="0" step="0.01" value="${cost}" oninput="setCost('${roomId}','${groupId}',${isCustom},${refIdx}, this.value)" />
        ${isCustom ? `<button onclick="deleteCustom('${roomId}','${groupId}',${customIdx})" class="w-9 h-9 rounded-lg active:bg-slate-100 text-slate-400" aria-label="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mx-auto"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>` : ''}

function renderDealAnalyzer(p){
  const d = p.deal;
  const repairs = projectTotal(p);
  const holding = (d.purchase||0) * (d.holdingPct/100) * (d.holdingMonths||0);
  const commission = (d.arv||0) * (d.commissionPct/100);
  const basis = (d.purchase||0) + repairs + holding + commission;
  const profit = (d.arv||0) - basis;
  const roi = basis > 0 ? (profit/basis)*100 : 0;
  let verdict, vColor, vBg;
  if(roi >= 20){ verdict="Strong Deal"; vColor="#065F46"; vBg="#D1FAE5"; }
  else if(roi >= 10){ verdict="Marginal"; vColor="#92400E"; vBg="#FEF3C7"; }
  else { verdict="Pass"; vColor="#991B1B"; vBg="#FEE2E2"; }
  const total = (d.purchase||0)+repairs+holding+commission;
  const pct = (n) => total>0 ? (n/total*100) : 0;

  return `
    <section class="mt-4">
      <div class="room-head mb-2" style="background:linear-gradient(135deg,#111827,#1F2937);">
        <div class="flex items-center gap-2 font-bold">💡 Deal Analyzer</div>
        <span class="badge" style="background:${vBg};color:${vColor};">${verdict}</span>
      </div>
      <div class="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
        <div class="grid grid-cols-2 gap-2">
          ${dealInput("Purchase Price","purchase",d.purchase,"$")}
          ${dealInput("ARV","arv",d.arv,"$")}
          ${dealInput("Holding %/mo","holdingPct",d.holdingPct,"%")}
          ${dealInput("Holding Months","holdingMonths",d.holdingMonths,"#")}
          ${dealInput("Commission %","commissionPct",d.commissionPct,"%")}
        </div>
        <div class="border-t border-slate-100 pt-3 space-y-1.5 text-sm">
          <div class="flex justify-between text-slate-600"><span>Purchase</span><b class="text-slate-900">${fmt(d.purchase||0)}</b></div>
          <div class="flex justify-between text-slate-600"><span>Repairs</span><b class="text-slate-900">${fmt(repairs)}</b></div>
          <div class="flex justify-between text-slate-600"><span>Holding (${d.holdingMonths}mo @ ${d.holdingPct}%)</span><b class="text-slate-900">${fmt(holding)}</b></div>
          <div class="flex justify-between text-slate-600"><span>Commission</span><b class="text-slate-900">${fmt(commission)}</b></div>
          <div class="flex justify-between pt-1.5 border-t border-slate-100"><span class="font-semibold">Total Basis</span><b>${fmt(basis)}</b></div>
        </div>
        <div class="roi-bar">
          <div style="background:#94A3B8;width:${pct(d.purchase||0)}%"></div>
          <div style="background:#C2500A;width:${pct(repairs)}%"></div>
          <div style="background:#FCD34D;width:${pct(holding)}%"></div>
          <div style="background:#60A5FA;width:${pct(commission)}%"></div>
        </div>
        <div class="flex justify-between gap-2 text-[10px] text-slate-500">
          <span>● Purchase</span><span style="color:#C2500A">● Repairs</span><span style="color:#B45309">● Hold</span><span style="color:#1D4ED8">● Comm</span>
        </div>
        <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-100">
          <div class="text-center p-3 rounded-xl" style="background:${vBg};">
            <div class="text-[10px] uppercase font-semibold" style="color:${vColor};">Gross Profit</div>
            <div class="text-xl font-extrabold tabular-nums" style="color:${vColor};">${fmt(profit)}</div>
          </div>
          <div class="text-center p-3 rounded-xl" style="background:${vBg};">
            <div class="text-[10px] uppercase font-semibold" style="color:${vColor};">ROI</div>
            <div class="text-xl font-extrabold tabular-nums" style="color:${vColor};">${roi.toFixed(1)}%</div>
          </div>
        </div>
      </div>
    </section>`;
}
function dealInput(label, key, val, prefix){
  return `<label class="block">
    <span class="text-[10px] uppercase tracking-wider font-semibold text-slate-500">${label}</span>
    <div class="relative mt-1">
      <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm">${prefix}</span>
      <input type="number" min="0" step="any" value="${val||0}" onchange="setDeal('${key}', this.value)" class="w-full h-10 pl-7 pr-2 border border-slate-200 rounded-lg font-semibold tabular-nums" />
    </div>
  </label>`;
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ============ EVENTS ============ */
function toggleGroup(key, headEl){
  const open = sessionStorage.getItem(key) === "1";
  sessionStorage.setItem(key, open ? "0" : "1");
  render();
}
function toggleNoAction(rid, gid){
  const g = findGroup(rid,gid); if(!g) return;
  g.noAction = !g.noAction;
  if(g.noAction){
    g.items.forEach(i=>i.qty=0);
    (g.customItems||[]).forEach(i=>i.qty=0);
  }
  save(); render();
}
function toggleItem(rid, gid, isCustom, ref){
  const g = findGroup(rid,gid); if(!g) return;
  const it = isCustom ? g.customItems[ref] : g.items.find(i=>i.itemId===ref);
  if(!it) return;
  if(it.qty > 0) it.qty = 0;
  else { it.qty = 1; g.noAction = false; }
  save(); render();
}
function stepQty(rid, gid, isCustom, ref, delta){
  const g = findGroup(rid,gid); if(!g) return;
  const it = isCustom ? g.customItems[ref] : g.items.find(i=>i.itemId===ref);
  if(!it) return;
  it.qty = Math.max(0, (parseFloat(it.qty)||0) + delta);
  if(it.qty>0) g.noAction = false;
  save(); render();
}
function setQty(rid, gid, isCustom, ref, val){
  const g = findGroup(rid,gid); if(!g) return;
  const it = isCustom ? g.customItems[ref] : g.items.find(i=>i.itemId===ref);
  if(!it) return;
  it.qty = Math.max(0, parseFloat(val)||0);
  if(it.qty>0) g.noAction = false;
  save();
  // light update only
  document.getElementById('grandTotal').textContent = fmt(projectTotal(current()));
}
function setCost(rid, gid, isCustom, ref, val){
  const g = findGroup(rid,gid); if(!g) return;
  const v = Math.max(0, parseFloat(val)||0);
  if(isCustom){
    g.customItems[ref].cost = v;
  } else {
    const it = g.items.find(i=>i.itemId===ref);
    if(!it) return;
    it.costOverride = v;
    current().priceOverrides[ref] = v;
  }
  save();
  document.getElementById('grandTotal').textContent = fmt(projectTotal(current()));
}
function deleteCustom(rid, gid, idx){
  const g = findGroup(rid,gid); if(!g) return;
  g.customItems.splice(idx,1); save(); render();
}
function findGroup(rid, gid){
  const p = current();
  for(const r of p.rooms) if(r.id===rid) for(const g of r.groups) if(g.id===gid) return g;
  return null;
}

/* ===== Price CSV ===== */
function importPriceCsv(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    const lines = r.result.split(/\r?\n/);
    let n = 0;
    for(const line of lines){
      const parts = line.split(",").map(s=>s.trim().replace(/^"|"$/g,''));
      if(parts.length<2) continue;
      const id = parts[0]; const cost = parseFloat(parts[1]);
      if(ITEMS[id] && !isNaN(cost)){ state.priceOverridesGlobal[id] = cost; n++; }
    }
    save(); toast(`Updated ${n} prices`); closeSheet(); render();
  };
  r.readAsText(f);
}
function exportPriceCsv(){
  let csv = "id,name,cost,unit\n";
  for(const id of Object.keys(ITEMS)){
    const c = state.priceOverridesGlobal[id] != null ? state.priceOverridesGlobal[id] : ITEMS[id].cost;
    csv += `${id},"${ITEMS[id].name}",${c},${ITEMS[id].unit}\n`;
  }
  downloadBlob(new Blob([csv],{type:"text/csv"}), "spark-prices.csv");
}
function resetPrices(){
  if(!confirm("Reset all global price overrides?")) return;
  state.priceOverridesGlobal = {}; save(); toast("Prices reset"); render();
}

/* ===== Photos + OCR ===== */
async function addPhoto(e){
  const f = e.target.files[0]; if(!f) return;
  const dataUrl = await fileToCompressedDataUrl(f, 1280, 0.78);
  const p = current();
  const ph = { id: uid(), dataUrl, ocr: "", ocrStatus: "pending" };
  if(!p.photos) p.photos = [];
  p.photos.push(ph); save(); render();
  // OCR
  try {
    if(window.Tesseract){
      const res = await Tesseract.recognize(dataUrl, 'eng');
      const text = (res.data.text || "").trim();
      const serial = extractSerial(text);
      ph.ocr = serial || text.split(/\s+/).slice(0,6).join(' ');
      ph.ocrStatus = "done"; save(); render();
    } else { ph.ocrStatus="done"; save(); render(); }
  } catch(err){ console.warn(err); ph.ocrStatus="done"; save(); render(); }
  e.target.value = "";
}
function extractSerial(text){
  // Look for typical serial/model patterns
  const lines = text.split(/\r?\n/);
  for(const line of lines){
    const m = line.match(/\b([A-Z0-9]{2,}[-]?[A-Z0-9]{4,})\b/i);
    if(m && /\d/.test(m[1]) && /[A-Za-z]/.test(m[1])) return m[1];
  }
  const m2 = text.match(/\b([A-Z0-9]{6,20})\b/);
  return m2 ? m2[1] : "";
}
function fileToCompressedDataUrl(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const c = document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject; img.src = r.result;
    };
    r.onerror = reject; r.readAsDataURL(file);
  });
}
function deletePhoto(id){
  const p = current(); p.photos = (p.photos||[]).filter(x=>x.id!==id); save(); render();
}

/* ===== Export ZIP ===== */
async function exportProject(){
  const p = current(); if(!p) return;
  toast("Building export…");
  const rows = [["Room","Group","Item","Qty","Unit","Unit Cost","Line Total"]];
  let grand = 0;
  for(const r of p.rooms){
    for(const g of r.groups){
      const all = [...g.items, ...(g.customItems||[])];
      for(const it of all){
        if(!it.qty || it.qty<=0) continue;
        const name = it.custom ? it.name : ITEMS[it.itemId].name;
        const unit = it.custom ? it.unit : ITEMS[it.itemId].unit;
        const cost = it.custom ? it.cost : (it.costOverride != null ? it.costOverride : getCost(it.itemId, p));
        const total = (it.qty||0)*cost; grand += total;
        rows.push([r.name, g.name, name, it.qty, unit, cost, total]);
      }
    }
  }
  rows.push(["","","","","","Grand Total", grand]);

  const ws = XLSX.utils.aoa_to_sheet(rows);
  // Style header
  const headerStyle = { fill:{fgColor:{rgb:"C2500A"}}, font:{color:{rgb:"FFFFFF"}, bold:true}, alignment:{horizontal:"center"} };
  const totalStyle = { font:{bold:true}, fill:{fgColor:{rgb:"FDF2E9"}} };
  for(let c=0;c<7;c++){
    const cell = XLSX.utils.encode_cell({r:0,c});
    if(ws[cell]) ws[cell].s = headerStyle;
  }
  const lastRow = rows.length-1;
  for(let c=0;c<7;c++){
    const cell = XLSX.utils.encode_cell({r:lastRow,c});
    if(ws[cell]) ws[cell].s = totalStyle;
  }
  // Currency format
  for(let r=1;r<rows.length;r++){
    for(const c of [5,6]){
      const cell = XLSX.utils.encode_cell({r,c});
      if(ws[cell]){ ws[cell].t = "n"; ws[cell].z = '"$"#,##0.00'; }
    }
  }
  ws['!cols'] = [{wch:18},{wch:24},{wch:38},{wch:8},{wch:12},{wch:12},{wch:14}];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Estimate");

  // Deal sheet
  const d = p.deal; const repairs = projectTotal(p);
  const holding = (d.purchase||0)*(d.holdingPct/100)*(d.holdingMonths||0);
  const commission = (d.arv||0)*(d.commissionPct/100);
  const basis = (d.purchase||0)+repairs+holding+commission;
  const profit = (d.arv||0)-basis;
  const roi = basis>0 ? profit/basis*100 : 0;
  const dealRows = [
    ["Spark Homes Deal Analysis"],
    ["Project", p.name],
    [],
    ["Purchase Price", d.purchase||0],
    ["ARV", d.arv||0],
    ["Repair Estimate", repairs],
    ["Holding Costs", holding],
    ["Commission", commission],
    ["Total Cost Basis", basis],
    ["Gross Profit", profit],
    ["ROI %", roi/100],
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(dealRows);
  ws2['A1'].s = { font:{bold:true,sz:14,color:{rgb:"C2500A"}} };
  for(let r=3;r<=9;r++){ const c = XLSX.utils.encode_cell({r,c:1}); if(ws2[c]){ ws2[c].t="n"; ws2[c].z='"$"#,##0.00'; } }
  const roiCell = XLSX.utils.encode_cell({r:10,c:1}); if(ws2[roiCell]){ ws2[roiCell].t="n"; ws2[roiCell].z='0.0%'; }
  ws2['!cols'] = [{wch:24},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws2, "Deal Analysis");

  const xlsxOut = XLSX.write(wb, { bookType:"xlsx", type:"array", cellStyles:true });

  const zip = new JSZip();
  const safe = p.name.replace(/[^a-z0-9-_ ]/gi,'_').trim() || "project";
  zip.file(`${safe} - Estimate.xlsx`, xlsxOut);
  (p.photos||[]).forEach((ph, i) => {
    const b64 = ph.dataUrl.split(',')[1];
    zip.file(`photos/photo-${i+1}.jpg`, b64, { base64:true });
  });
  const blob = await zip.generateAsync({ type:"blob" });
  downloadBlob(blob, `${safe}.zip`);
  toast("Export downloaded");
}
function downloadBlob(blob, name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 200);
}

/* ============ PWA: inline service worker ============ */
if('serviceWorker' in navigator && location.protocol !== 'file:'){
  const swCode = `
    const CACHE = 'spark-estimator-v1';
    const ASSETS = [
      'https://cdn.tailwindcss.com',
      'https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js',
      'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js',
      'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js'
    ];
    self.addEventListener('install', e => {
      self.skipWaiting();
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS).catch(()=>{})));
    });
    self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
    self.addEventListener('fetch', e => {
      const req = e.request;
      if(req.method !== 'GET') return;
      e.respondWith(
        caches.match(req).then(hit => hit || fetch(req).then(res => {
          const copy = res.clone();
          if(res.ok) caches.open(CACHE).then(c => c.put(req, copy)).catch(()=>{});
          return res;
        }).catch(() => caches.match('/estimator.html')))
      );
    });
  `;
  const blob = new Blob([swCode], { type:'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(err => console.warn('SW failed', err));
}
